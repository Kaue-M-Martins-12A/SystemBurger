<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger - Cadastro</title>
    <link rel="stylesheet" href="/styles/styles.css">
    <script src="/js/auth.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <header class="auth-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M3 13.5C3 12.6716 3.67157 12 4.5 12H19.5C20.3284 12 21 12.6716 21 13.5C21 14.3284 20.3284 15 19.5 15H4.5C3.67157 15 3 14.3284 3 13.5Z" />
                    <path
                        d="M4.5 17C3.67157 17 3 17.6716 3 18.5C3 19.3284 3.67157 20 4.5 20H19.5C20.3284 20 21 19.3284 21 18.5C21 17.6716 20.3284 17 19.5 17H4.5Z" />
                    <path
                        d="M21 9C21 5.13401 16.9706 2 12 2C7.02944 2 3 5.13401 3 9C3 9.55228 3.44772 10 4 10H20C20.5523 10 21 9.55228 21 9Z" />
                </svg>
                <span>Burger</span>
            </div>
        </header>
        <main class="auth-content">
            <div class="auth-card">
                <h1 class="title-center" style="font-size: 1.8rem;">Criar Minha Conta</h1>
                <form class="auth-form" id="register-form">
                    <div>
                        <label class="input-label">Nome Completo</label>
                        <input type="text" id="reg-name" placeholder="Seu nome completo" class="input-field" required>
                    </div>
                    <div style="margin-top: 15px;">
                        <label class="input-label">Email</label>
                        <input type="email" id="reg-email" placeholder="Seu melhor email" class="input-field" required>
                    </div>
                    <div style="margin-top: 15px;">
                        <label class="input-label">Criar Senha</label>
                        <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" class="input-field"
                            required minlength="8">
                    </div>
                    <div style="margin-top: 15px;">
                        <label class="input-label">Confirmar Senha</label>
                        <input type="password" id="reg-confirm" placeholder="Repita sua senha" class="input-field"
                            required>
                    </div>
                    <button type="submit" class="btn-primary" id="reg-btn" style="margin-top: 25px;">Criar
                        Conta</button>
                </form>
                <div class="auth-footer-link" style="margin-top: 20px;">
                    <p>Já tem uma Conta? <a href="/login">Entre aqui</a></p>
                </div>
            </div>
        </main>
    </div>
</body>
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;

        if (password !== confirm) {
            alert('As senhas não coincidem!');
            return;
        }

        const btn = document.getElementById('reg-btn');
        btn.disabled = true;
        btn.textContent = 'Carregando...';
        await Auth.register(name, email, password);
        btn.disabled = false;
        btn.textContent = 'Criar Conta';
    });
</script>

</html>
