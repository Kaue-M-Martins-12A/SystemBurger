<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger - Carrinho</title>
    <link rel="stylesheet" href="/styles/styles.css">
    <script src="/js/auth.js" defer></script>
    <script src="/js/cart.js" defer></script>
    <style>
        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-img {
            width: 100px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            background: #eee;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .remove-link {
            color: var(--primary-red);
            font-size: 0.85rem;
            cursor: pointer;
            margin-left: 20px;
        }

        .empty-cart {
            text-align: center;
            padding: 100px 0;
        }

        /* Standard Header Styles */
        .main-header {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            font-size: 0.9rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <div class="logo">
            <a href="/" style="display: flex; align-items: center; gap: 8px; color: inherit; text-decoration: none;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M3 13.5C3 12.6716 3.67157 12 4.5 12H19.5C20.3284 12 21 12.6716 21 13.5C21 14.3284 20.3284 15 19.5 15H4.5C3.67157 15 3 14.3284 3 13.5Z" />
                    <path
                        d="M4.5 17C3.67157 17 3 17.6716 3 18.5C3 19.3284 3.67157 20 4.5 20H19.5C20.3284 20 21 19.3284 21 18.5C21 17.6716 20.3284 17 19.5 17H4.5Z" />
                    <path
                        d="M21 9C21 5.13401 16.9706 2 12 2C7.02944 2 3 5.13401 3 9C3 9.55228 3.44772 10 4 10H20C20.5523 10 21 9.55228 21 9Z" />
                </svg>
                <span>Burger</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="/cardapio">Menu</a>
            <a href="/#promocoes">Promoções</a>
            <a href="#">Sobre nós</a>
        </nav>
        <div class="header-actions">
            <a href="/carrinho" id="cart-link">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cart-count">0</span>
            </a>
            <a href="/perfil">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&auto=format&fit=crop&w=40&q=80"
                    alt="Profile" class="profile-img">
            </a>
        </div>
    </header>

    <main class="container" style="padding: 60px 20px;">
        <h1 class="profile-title">Meu Carrinho</h1>

        <div id="cart-content">
            <!-- Dynamic content -->
        </div>

        <div id="cart-summary" style="margin-top: 40px; display: none;">
            <div class="summary-total" style="border-top: 2px solid #eee; padding-top: 20px;">
                <span>Total do Pedido</span>
                <span id="cart-total-value">R$ 0,00</span>
            </div>
            <a href="/pagamento" class="btn-primary"
                style="margin-top: 30px; width: 100%; text-align: center;">Continuar para o Pagamento</a>
        </div>
    </main>

    <script>
        function renderCart() {
            const items = Cart.getItems();
            const container = document.getElementById('cart-content');
            const summary = document.getElementById('cart-summary');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <p style="margin-bottom: 20px; font-size: 1.2rem; color: #666;">Seu carrinho está vazio.</p>
                        <a href="/cardapio" class="btn-primary">Ver Cardápio</a>
                    </div>
                `;
                summary.style.display = 'none';
                return;
            }

            summary.style.display = 'block';
            let html = '';
            let total = 0;

            items.forEach(item => {
                total += item.price * item.quantity;
                html += `
                    <div class="cart-item">
                        <img src="${item.image}" class="cart-item-img">
                        <div class="cart-item-info">
                            <h3 style="font-size: 1.1rem; font-weight: 700;">${item.name}</h3>
                            <p style="color: var(--primary-red); font-weight: 700; margin-top: 5px;">R$ ${item.price.toFixed(2).replace('.', ',')}</p>
                        </div>
                        <div class="cart-item-actions">
                            <button class="qty-btn" onclick="Cart.updateQuantity('${item.id}', -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="Cart.updateQuantity('${item.id}', 1)">+</button>
                            <span class="remove-link" onclick="Cart.removeItem('${item.id}')">Remover</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('cart-total-value').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        document.addEventListener('DOMContentLoaded', renderCart);
        window.renderCart = renderCart;
    </script>
</body>

</html>
